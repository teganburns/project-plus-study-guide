<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{{ page.title }} | {{ site.title }}</title>
    <meta name="description" content="{{ site.description }}">
    <style>
      :root {
        color-scheme: light;
        --ink: #1f2933;
        --muted: #586574;
        --line: #d8e0e8;
        --surface: #f7f9fb;
        --accent: #1f6feb;
        --accent-soft: #e8f1ff;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        color: var(--ink);
        background: #ffffff;
        font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        line-height: 1.6;
      }

      a {
        color: var(--accent);
      }

      .site-header {
        border-bottom: 1px solid var(--line);
        background: var(--surface);
      }

      .wrap {
        width: min(960px, calc(100% - 32px));
        margin: 0 auto;
      }

      .site-header .wrap {
        display: flex;
        gap: 20px;
        align-items: center;
        justify-content: space-between;
        padding: 18px 0;
      }

      .brand {
        color: var(--ink);
        font-weight: 750;
        text-decoration: none;
      }

      nav {
        display: flex;
        flex-wrap: wrap;
        gap: 14px;
      }

      nav a {
        color: var(--muted);
        font-size: 0.95rem;
        text-decoration: none;
      }

      nav a:hover {
        color: var(--accent);
      }

      main {
        padding: 44px 0 64px;
      }

      h1,
      h2,
      h3 {
        line-height: 1.2;
      }

      h1 {
        margin: 0 0 18px;
        font-size: clamp(2rem, 6vw, 3.4rem);
      }

      h2 {
        margin-top: 42px;
        padding-top: 18px;
        border-top: 1px solid var(--line);
      }

      p,
      li {
        font-size: 1.05rem;
      }

      .lede {
        max-width: 760px;
        color: var(--muted);
        font-size: 1.22rem;
      }

      .quick-links {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
        gap: 14px;
        margin: 30px 0;
        padding: 0;
        list-style: none;
      }

      .quick-links a {
        display: block;
        min-height: 100%;
        padding: 18px;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: var(--surface);
        color: var(--ink);
        font-weight: 700;
        text-decoration: none;
      }

      .quick-links a:hover {
        border-color: var(--accent);
        background: var(--accent-soft);
      }

      .definition-grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
        gap: 18px;
        margin: 30px 0 42px;
      }

      .definition-card {
        min-height: 420px;
        border-radius: 8px;
        cursor: pointer;
        perspective: 1200px;
        outline: none;
      }

      .definition-card:focus-visible .definition-card-inner {
        outline: 3px solid var(--accent);
        outline-offset: 4px;
      }

      .definition-card-inner {
        position: relative;
        width: 100%;
        min-height: 420px;
        transform-style: preserve-3d;
        transition: transform 220ms ease;
      }

      .definition-card.is-flipped .definition-card-inner {
        transform: rotateY(180deg);
      }

      .definition-face {
        position: absolute;
        inset: 0;
        display: flex;
        flex-direction: column;
        justify-content: center;
        min-height: 420px;
        padding: 24px;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: var(--surface);
        backface-visibility: hidden;
        box-shadow: 0 10px 28px rgba(31, 41, 51, 0.08);
      }

      .definition-front {
        align-items: flex-start;
      }

      .definition-back {
        justify-content: flex-start;
        overflow: auto;
        transform: rotateY(180deg);
        background: #ffffff;
      }

      .definition-label {
        margin: 0 0 12px;
        color: var(--accent);
        font-size: 0.82rem;
        font-weight: 800;
        letter-spacing: 0;
        text-transform: uppercase;
      }

      .definition-card h2 {
        margin: 0;
        padding: 0;
        border: 0;
        font-size: 1.75rem;
      }

      .definition-back h2 {
        margin-bottom: 12px;
        font-size: 1.35rem;
      }

      .definition-back p,
      .definition-back li {
        font-size: 0.98rem;
      }

      .definition-back p {
        margin: 0 0 12px;
      }

      .definition-back p:last-child {
        margin-bottom: 0;
      }

      .definition-back ul {
        margin: 10px 0 16px;
        padding-left: 20px;
      }

      code {
        padding: 2px 5px;
        border-radius: 4px;
        background: var(--surface);
      }

      .site-footer {
        border-top: 1px solid var(--line);
        color: var(--muted);
        background: var(--surface);
        font-size: 0.95rem;
      }

      .site-footer .wrap {
        padding: 22px 0;
      }

      @media (max-width: 640px) {
        .site-header .wrap {
          align-items: flex-start;
          flex-direction: column;
        }

        main {
          padding-top: 32px;
        }

        .definition-card,
        .definition-card-inner,
        .definition-face {
          min-height: 430px;
        }
      }

      @media (prefers-reduced-motion: reduce) {
        .definition-card-inner {
          transition: none;
        }
      }
    </style>
  </head>
  <body>
    <header class="site-header">
      <div class="wrap">
        <a class="brand" href="{{ '/' | relative_url }}">{{ site.title }}</a>
        <nav aria-label="Main navigation">
          <a href="{{ '/definitions/' | relative_url }}">Definitions</a>
          <a href="{{ '/test-day-reference/' | relative_url }}">Test Day Reference</a>
          <a href="https://github.com/teganburns/project-plus-study-guide">GitHub</a>
        </nav>
      </div>
    </header>

    <main class="wrap">
      {{ content }}
    </main>

    <footer class="site-footer">
      <div class="wrap">
        Independent study guide. Not affiliated with or endorsed by CompTIA.
      </div>
    </footer>

    <script>
      document.querySelectorAll(".definition-card").forEach((card) => {
        const toggleCard = () => {
          const isFlipped = card.classList.toggle("is-flipped");
          card.setAttribute("aria-pressed", String(isFlipped));
        };

        card.addEventListener("click", toggleCard);
        card.addEventListener("keydown", (event) => {
          if (event.key === "Enter" || event.key === " ") {
            event.preventDefault();
            toggleCard();
          }
        });
      });
    </script>
  </body>
</html>
